name: Dispatch Release
on:
  repository_dispatch:
    types:
      - release-spacedf-docs

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Client payload
        run: |
          cat <<'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

      - name: Release
        if: ${{ github.event.client_payload.release_target_commitish == 'main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.release_tag }}
          body: ${{ github.event.client_payload.release_body }}
          target_commitish: 'main'

  generate-doc:
    needs:  create-release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate MDX file
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG="v${{ github.event.client_payload.release_tag }}"
          DIR="src/app/blog/(post)/${TAG}"
          mkdir -p "$DIR"
          
          cat <<EOF > "$DIR/page.mdx"
          ---
          title: Release ${TAG}
          date: ${DATE}
          type: Release
          author: SpaceDF Team
          description: "Welcome to the official release of SpaceDF - an all-in-one IoT platform designed for advanced asset tracking, monitoring, and management. SpaceDF empowers developers and organizations to build robust IoT solutions with ease, providing multi-protocol support and powerful visualization tools."
          ---
          
          ${{ github.event.client_payload.release_body }}
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        env:
          TAG: "${{ github.event.client_payload.release_tag }}"

        with:
          commit-message: Added release note for release ${{ env.TAG }} version
          title: 'Publish the release note for release ${{ env.TAG }} version'
          body: "Added release note for release ${{ env.TAG }} version"
          branch: release/v${{ env.TAG }}
          base: main
          labels: pending-review